  <body>
    <style>
        .firebase-emulator-warning {
            display: none;
        }
    </style>
    <style id="boot-style">
      #boot {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: radial-gradient(120% 90% at 50% -10%, #16243a, #0c1626 70%, #0a121f);
        overflow: hidden;
        transition: opacity .5s ease;
      }
      #boot.boot--hide { opacity: 0; pointer-events: none; }
      #boot .boot-shark {
        width: clamp(150px, 22vw, 230px); height: auto; position: relative; z-index: 2;
        filter: drop-shadow(0 18px 26px rgba(0,0,0,.45));
        animation: boot-bob 3s ease-in-out infinite;
        will-change: transform;
      }
      @keyframes boot-bob {
        0%   { transform: translateY(0)    rotate(-2.6deg) scale(1,1); }
        25%  { transform: translateY(-7px) rotate(0deg)    scale(1.01,.99); }
        50%  { transform: translateY(0)    rotate(2.6deg)  scale(1,1); }
        75%  { transform: translateY(7px)  rotate(0deg)    scale(.99,1.01); }
        100% { transform: translateY(0)    rotate(-2.6deg) scale(1,1); }
      }
      #boot .boot-b {
        position: absolute; bottom: -8%; border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, rgba(225,245,255,.9), rgba(90,200,230,.15) 60%, transparent 70%);
        border: 1px solid rgba(150,215,240,.35);
        animation: boot-rise var(--dur) linear infinite; animation-delay: var(--del);
        opacity: 0;
      }
      @keyframes boot-rise {
        0%   { transform: translateY(0) translateX(0) scale(.6); opacity: 0; }
        10%  { opacity: .9; }
        50%  { transform: translateY(-60vh) translateX(var(--drift)) scale(1); }
        85%  { opacity: .8; }
        100% { transform: translateY(-110vh) translateX(calc(var(--drift) * -1)) scale(1.1); opacity: 0; }
      }
      #boot .boot-cap {
        position: absolute; bottom: 8%; left: 0; right: 0; text-align: center;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 11px; letter-spacing: .32em; text-transform: uppercase; color: rgba(180,210,225,.8);
      }
      #boot .boot-cap::after { content: ""; animation: boot-dots 1.6s steps(4) infinite; }
      @keyframes boot-dots { 0%{content:"";} 25%{content:".";} 50%{content:"..";} 75%{content:"...";} }
      @media (prefers-reduced-motion: reduce) {
        #boot .boot-shark, #boot .boot-b { animation: none; }
        #boot .boot-b { opacity: .8; }
      }
    </style>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" style="height: 100vh"></div>
    <div id="boot" role="status" aria-label="Immersion en cours">
      <span class="boot-b" style="left:12%; width:10px; height:10px; --dur:3.4s; --del:0s;   --drift:10px;"></span>
      <span class="boot-b" style="left:22%; width:16px; height:16px; --dur:4.2s; --del:.6s;  --drift:-14px;"></span>
      <span class="boot-b" style="left:33%; width:7px;  height:7px;  --dur:3s;   --del:1.1s; --drift:8px;"></span>
      <span class="boot-b" style="left:62%; width:13px; height:13px; --dur:3.8s; --del:.3s;  --drift:-10px;"></span>
      <span class="boot-b" style="left:71%; width:9px;  height:9px;  --dur:3.3s; --del:1.4s; --drift:12px;"></span>
      <span class="boot-b" style="left:82%; width:18px; height:18px; --dur:4.6s; --del:.9s;  --drift:-16px;"></span>
      <span class="boot-b" style="left:46%; width:6px;  height:6px;  --dur:2.8s; --del:1.8s; --drift:6px;"></span>
      <span class="boot-b" style="left:55%; width:11px; height:11px; --dur:4s;   --del:2.1s; --drift:-9px;"></span>
      <img class="boot-shark" src="%PUBLIC_URL%/cute-shark-boot.svg" alt="" />
      <div class="boot-cap">Immersion en cours</div>
    </div>
  </body>
